services:
  paperclip:
    image: node:22-alpine
    container_name: paperclip_paperclip_1
    restart: unless-stopped
    entrypoint: []
    command: >
      sh -c "npm install -g paperclipai@latest && paperclipai run"
    environment:
      - NODE_ENV=production
      - PAPERCLIP_PORT=3100
      - PAPERCLIP_HOST=0.0.0.0
    volumes:
      - ${APP_DATA_DIR}/data:/data
    ports:
      - "${APP_PORT}:3100"
